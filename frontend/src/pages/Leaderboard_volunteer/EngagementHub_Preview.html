/* ── STREAK ─────────────────────────────── */
function CircleRing({value,max,size=138,sw=11}){
  const r=(size-sw)/2,circ=2*Math.PI*r;
  const [prog,setProg]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setProg(value/max),400);return()=>clearTimeout(t);},[value,max]);
  return(
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(34,197,94,0.12)" strokeWidth={sw}/>
      <motion.circle cx={size/2} cy={size/2} r={r} fill="none" stroke="url(#sg)" strokeWidth={sw} strokeLinecap="round" strokeDasharray={circ} initial={{strokeDashoffset:circ}} animate={{strokeDashoffset:circ*(1-prog)}} transition={{duration:1.6,ease:"easeOut",delay:0.5}}/>
      <defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="#22c55e"/><stop offset="100%" stopColor="#14b8a6"/></linearGradient></defs>
    </svg>
  );
}

/* ── XP PROGRESS ────────────────────────── */
function CountUp({from,to,duration=1.6,delay=0}){
  const [val,setVal]=useState(from);
  useEffect(()=>{
    let start=null,raf;
    const run=(ts)=>{
      if(!start)start=ts;
      const e=(ts-start)/1000;
      if(e<delay){raf=requestAnimationFrame(run);return;}
      const t=Math.min((e-delay)/duration,1);
      setVal(Math.round(from+(to-from)*(1-Math.pow(1-t,3))));
      if(t<1)raf=requestAnimationFrame(run);
    };
    raf=requestAnimationFrame(run);
    return()=>cancelAnimationFrame(raf);
  },[from,to,duration,delay]);
  return <>{val.toLocaleString()}</>;
}
function XPProgress(){
  const [showXP,setShowXP]=useState(false);

  const curXP=3840,lvlXP=4000,pct=(curXP/lvlXP)*100;

  return(
    <GlassCard delay={0.15}>
      <div style={{position:"absolute",top:-60,right:-60,width:200,height:200,background:"radial-gradient(circle,rgba(245,158,11,0.07),transparent 70%)",borderRadius:"50%",pointerEvents:"none"}}/>
      <CardHeader title="XP Progress" sub="Advancing to Level 9">
        <motion.span whileHover={{rotate:20,scale:1.2}} onClick={claim} style={{fontSize:26,cursor:"pointer"}}>⚡</motion.span>
      </CardHeader>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {["LVL 8","→","LVL 9"].map((t,i)=>(
            <div key={i} style={i===1?{fontSize:13,color:"#64748b"}:{background:i===0?"linear-gradient(135deg,#f59e0b,#ef4444)":"linear-gradient(135deg,#22c55e,#14b8a6)",borderRadius:10,padding:"5px 12px",fontWeight:800,fontSize:13,color:"#fff",boxShadow:i===0?"0 3px 12px rgba(245,158,11,0.4)":"0 3px 12px rgba(34,197,94,0.4)",opacity:i===2?0.55:1}}>{t}</div>
          ))}
        </div>
        <div style={{position:"relative"}}>
          <span style={{fontWeight:800,fontSize:16,color:"#0f172a"}}><CountUp from={0} to={curXP} duration={1.8} delay={0.3}/></span>
          <span style={{color:"#94a3b8",fontWeight:500,fontSize:12}}> / {lvlXP.toLocaleString()} XP</span>
          <AnimatePresence>
            {showXP&&<motion.div key="xp" initial={{opacity:1,y:0}} animate={{opacity:0,y:-40,scale:1.2}} exit={{}} transition={{duration:1.8}} style={{position:"absolute",top:-8,right:0,fontWeight:800,fontSize:15,color:"#22c55e",whiteSpace:"nowrap",textShadow:"0 2px 8px rgba(34,197,94,0.45)"}}>+120 XP ✨</motion.div>}
          </AnimatePresence>
        </div>
      </div>
      <div style={{height:13,borderRadius:99,background:"rgba(245,158,11,0.1)",overflow:"hidden",position:"relative",marginBottom:6}}>
        <motion.div initial={{width:0}} animate={{width:`${pct}%`}} transition={{duration:1.8,ease:"easeOut",delay:0.4}} style={{height:"100%",borderRadius:99,background:"linear-gradient(90deg,#f59e0b,#ef4444)",position:"relative",overflow:"hidden"}}>
          <motion.div animate={shimmer?{x:["-100%","220%"]}:{x:"-100%"}} transition={{duration:0.7}} style={{position:"absolute",inset:0,width:"50%",background:"linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent)"}}/>
        </motion.div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,fontWeight:600,marginBottom:14}}>
        <span style={{color:"#94a3b8"}}>{Math.round(pct)}% complete</span>
        <span style={{color:"#f59e0b"}}>{lvlXP-curXP} XP remaining</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9,marginBottom:14}}>
        {[["💠","24,800","Total XP"],["📈","+960","This Week","#22c55e"],["🏅","+340","Best Day"]].map(([icon,val,lbl,clr],i)=>(
          <motion.div key={i} whileHover={{scale:1.04}} style={{background:"rgba(248,250,252,0.85)",borderRadius:13,padding:"10px",border:"1px solid rgba(226,232,240,0.8)",textAlign:"center"}}>
            <div style={{fontSize:15}}>{icon}</div>
            <div style={{fontWeight:800,fontSize:14,color:clr||"#0f172a",marginTop:2}}>{val}</div>
            <div style={{fontSize:10,color:"#94a3b8",fontWeight:600}}>{lbl}</div>
          </motion.div>
        ))}
      </div>
      <motion.button whileHover={{scale:1.02,boxShadow:"0 8px 28px rgba(245,158,11,0.45)"}} whileTap={{scale:0.97}} onClick={claim}
        style={{width:"100%",padding:"12px",borderRadius:14,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#f59e0b,#ef4444)",color:"#fff",fontWeight:700,fontSize:14,boxShadow:"0 4px 18px rgba(245,158,11,0.35)",transition:"box-shadow 0.3s"}}

      onHoverStart={()=>setHov(true)} onHoverEnd={()=>setHov(false)}
      onClick={()=>onToggle(m.id)}
      style={{display:"flex",alignItems:"center",gap:13,padding:"13px 15px",borderRadius:15,background:m.completed?"linear-gradient(135deg,rgba(34,197,94,0.07),rgba(20,184,166,0.07))":hov?"rgba(255,255,255,0.92)":"rgba(255,255,255,0.55)",border:`1.5px solid ${m.completed?"rgba(34,197,94,0.22)":hov?"rgba(59,130,246,0.22)":"rgba(255,255,255,0.7)"}`,backdropFilter:"blur(10px)",boxShadow:hov&&!m.completed?"0 8px 24px rgba(0,0,0,0.08)":"none",transform:hov&&!m.completed?"translateY(-2px)":"translateY(0)",transition:"all 0.25s cubic-bezier(0.34,1.56,0.64,1)",cursor:m.completed?"default":"pointer"}}
    >
      <motion.div whileHover={!m.completed?{scale:1.12}:{}} whileTap={!m.completed?{scale:0.82}:{}}
        style={{width:24,height:24,borderRadius:8,flexShrink:0,border:`2px solid ${m.completed?"#22c55e":"rgba(148,163,184,0.5)"}`,background:m.completed?"linear-gradient(135deg,#22c55e,#14b8a6)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:m.completed?"0 2px 8px rgba(34,197,94,0.4)":"none",transition:"all 0.25s"}}
      >
        {m.completed&&<motion.div initial={{scale:0}} animate={{scale:1}} transition={{type:"spring",stiffness:400}} style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</motion.div>}
      </motion.div>
      <div style={{fontSize:20}}>{m.icon}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:600,fontSize:13,color:m.completed?"#64748b":"#0f172a",textDecoration:m.completed?"line-through":"none",lineHeight:1.35}}>{m.task}</div>
        <span style={{display:"inline-block",marginTop:3,fontSize:10,fontWeight:700,color:DC[m.diff],background:`${DC[m.diff]}18`,padding:"2px 7px",borderRadius:99}}>{m.diff}</span>
      </div>
      <div style={{fontWeight:800,fontSize:12,color:m.completed?"#22c55e":"#f59e0b",background:m.completed?"rgba(34,197,94,0.1)":"rgba(245,158,11,0.1)",padding:"4px 9px",borderRadius:99,flexShrink:0,border:`1px solid ${m.completed?"rgba(34,197,94,0.25)":"rgba(245,158,11,0.25)"}`}}>+{m.xp} XP</div>
    </motion.div>
  );
}

function DailyMissions(){
  const [missions,setMissions]=useState(INIT);
  const [popup,setPopup]=useState(null);
  const done=missions.filter(m=>m.completed).length,total=missions.length;
  const toggle=(id)=>{
    const m=missions.find(m=>m.id===id);
    if(m.completed)return;
    setMissions(prev=>prev.map(x=>x.id===id?{...x,completed:true}:x));
    setPopup({xp:m.xp});
  };
  return(
    <>
      <AnimatePresence>
        {popup&&<>
          <motion.div key="ov" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",backdropFilter:"blur(5px)",zIndex:9999}} onClick={()=>setPopup(null)}/>
          <RewardPopup key="rp" xp={popup.xp} onDone={()=>setPopup(null)}/>
        </>}
      </AnimatePresence>
      <GlassCard delay={0.2}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <div style={{fontWeight:800,fontSize:18,color:"#0f172a",letterSpacing:"-0.4px"}}>Daily Missions</div>
            <div style={{fontSize:12,color:"#64748b",marginTop:2}}>Resets in 8h 42m</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontWeight:800,fontSize:18,color:"#0f172a"}}>{done}/{total}</div>
            <div style={{fontSize:10,color:"#64748b",fontWeight:600}}>DONE</div>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:4}}>
            <span>Daily Progress</span><span>{Math.round((done/total)*100)}%</span>
          </div>
          <div style={{height:6,borderRadius:99,background:"rgba(59,130,246,0.1)",overflow:"hidden"}}>
            <motion.div animate={{width:`${(done/total)*100}%`}} transition={{duration:0.6,ease:"easeOut"}} style={{height:"100%",borderRadius:99,background:"linear-gradient(90deg,#3b82f6,#14b8a6)"}}/>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {missions.map((m,i)=><MissionRow key={m.id} m={m} i={i} onToggle={toggle}/>)}
        </div>
        <AnimatePresence>
          {done===total&&<motion.div initial={{opacity:0,scale:0.88}} animate={{opacity:1,scale:1}} exit={{opacity:0}} transition={{type:"spring",stiffness:200}} style={{marginTop:12,padding:"12px",background:"linear-gradient(135deg,rgba(34,197,94,0.1),rgba(20,184,166,0.1))",borderRadius:13,textAlign:"center",border:"1px solid rgba(34,197,94,0.28)"}}>
            <span style={{fontWeight:800,fontSize:13,color:"#22c55e"}}>🎯 All missions complete! Bonus: +50 XP</span>
          </motion.div>}
        </AnimatePresence>
      </GlassCard>
    </>
  );
}

/* ── BG ORBS ────────────────────────────── */
function BgOrbs(){
  return(
    <div style={{position:"absolute",inset:0,overflow:"hidden",pointerEvents:"none",zIndex:0}}>
      {[
        {top:"5%", left:"8%",  size:400,c:"rgba(34,197,94,0.06)", dur:7 },
        {top:"45%",right:"4%", size:320,c:"rgba(59,130,246,0.06)",dur:9,left:undefined},
        {top:"72%",left:"28%", size:300,c:"rgba(20,184,166,0.05)",dur:11},
      ].map((o,i)=>(
        <motion.div key={i} animate={{scale:[1,1.12,1],opacity:[0.7,1,0.7]}} transition={{duration:o.dur,repeat:Infinity,ease:"easeInOut",delay:i*2}}
          style={{position:"absolute",top:o.top,left:o.left,right:o.right,width:o.size,height:o.size,borderRadius:"50%",background:`radial-gradient(circle,${o.c},transparent)`,transform:"translate(-50%,-50%)"}}/>
      ))}
    </div>
  );
}

/* ── ROOT ───────────────────────────────── */

  return(
    <div style={{position:"relative",minHeight:"100vh",background:"linear-gradient(160deg,#f0fdf4 0%,#f0f9ff 45%,#eff6ff 100%)",fontFamily:"'DM Sans',system-ui,sans-serif",padding:"60px 24px 80px",boxSizing:"border-box"}}>
      <BgOrbs/>
      <div style={{position:"relative",zIndex:1,maxWidth:1200,margin:"0 auto"}}>

        {/* HEADER */}
        <motion.div initial={{opacity:0,y:-20}} animate={{opacity:1,y:0}} transition={{duration:0.6}} style={{textAlign:"center",marginBottom:48}}>
          <motion.div animate={{opacity:[0.7,1,0.7]}} transition={{duration:3,repeat:Infinity}}
            style={{display:"inline-flex",alignItems:"center",gap:8,background:"linear-gradient(135deg,rgba(34,197,94,0.1),rgba(20,184,166,0.1))",border:"1px solid rgba(34,197,94,0.25)",borderRadius:99,padding:"6px 18px",marginBottom:14,fontSize:12,fontWeight:700,color:"#22c55e",backdropFilter:"blur(10px)"}}
          >
            <motion.span animate={{scale:[1,1.3,1]}} transition={{duration:1.2,repeat:Infinity}}>🎮</motion.span>
            ENGAGEMENT HUB
          </motion.div>
          <h2 style={{fontFamily:"'DM Sans',system-ui,sans-serif",fontWeight:900,fontSize:"clamp(28px,4vw,42px)",background:"linear-gradient(135deg,#0f172a 0%,#14b8a6 50%,#3b82f6 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",margin:"0 0 10px",letterSpacing:"-1.5px",lineHeight:1.12}}>
            Sevak Engagement &<br/>Gamification Hub
          </h2>
          <p style={{color:"#64748b",fontSize:15,fontWeight:500,maxWidth:480,margin:"0 auto"}}>Grow your impact, earn rewards, and climb the leaderboard with your community.</p>
        </motion.div>

        {/* ROW 1 */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(340px,1fr))",gap:22,marginBottom:22}}>
          <Leaderboard/>
          <AchievementGrid/>
        </div>

        {/* ROW 2 */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:22}}>
          <StreakCard/>
          <XPProgress/>
          <DailyMissions/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
